version: '3.8'

services:
  db:
    image: postgres:15
    container_name: eloria-db
    environment:
      POSTGRES_DB: eloria_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: eloria-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: ./backend
    container_name: eloria-backend-django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=eloria_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: always

  celery:
    build: ./backend
    container_name: eloria-celery
    command: celery -A eloria worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_NAME=eloria_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build: ./frontend
    container_name: eloria-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
